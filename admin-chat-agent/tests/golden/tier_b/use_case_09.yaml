# Tier B — SQL + Code Specialist (execute_python). spec §1.2 / §8.5.1.
use_case_id: "09"
tier: B
name: "지난 30일 사용 패턴 outlier 사용자"
question: "지난 30일 사용 패턴 outlier 사용자 찾아줘"

expected:
  sql:
    # 사용자×일자 집계를 SQL 로 뽑은 뒤 Code 가 outlier 탐지.
    required_tables: ["usage.usage_logs"]
    required_clauses:
      - "GROUP BY"
      - "(interval|date_trunc|::date\\s*-|now\\(\\))"
    forbidden_clauses:
      - "INSERT|UPDATE|DELETE|DROP|TRUNCATE|ALTER"
    # §58: 일별 버킷이라 KST 앵커 필요((requested_at AT TIME ZONE 'Asia/Seoul')::date).
    timezone_kst: true
  code:
    # IsolationForest / DBSCAN / LocalOutlierFactor 등 outlier 기법.
    required_imports: ["sklearn"]
    required_any_of: ["IsolationForest", "DBSCAN", "LocalOutlierFactor", "EllipticEnvelope"]
  validator:
    verdict: "PASS"
    min_confidence: 0.5
  chart:
    kind: ["table", "bar", "image"]
  agent_path_includes: ["ask_sql_specialist", "ask_code_specialist", "ask_validator"]
