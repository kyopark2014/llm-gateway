    timezone_kst: true
  code:
    # SARIMAX / ETS 등 시계열 예측 (statsmodels; Prophet 은 sandbox 미설치).
    required_imports: ["statsmodels"]
    required_any_of: ["SARIMAX", "ExponentialSmoothing", "ARIMA", "ETSModel"]
  validator:
    verdict: "PASS"
    min_confidence: 0.5
  chart:
    kind: ["line", "area", "image"]
  agent_path_includes: ["ask_sql_specialist", "ask_code_specialist", "ask_validator"]
