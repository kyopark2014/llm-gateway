use_case_id: "12"
tier: B
name: "팀별 사용 시간대 패턴 시각화"
question: "팀별 사용 시간대 패턴 heatmap 으로 시각화해줘"

expected:
  sql:
    # team × hour_of_day 집계 (extract hour). teams join.
    required_tables: ["usage.usage_logs", "auth.teams"]
    required_clauses:
      - "GROUP BY"
      - "hour"
    forbidden_clauses:
      - "INSERT|UPDATE|DELETE|DROP|TRUNCATE|ALTER"
  code:
    # matplotlib/seaborn heatmap → PNG → S3.
    required_imports: ["matplotlib"]
    required_any_of: ["heatmap", "imshow", "pcolormesh"]
  validator:
    verdict: "PASS"
    min_confidence: 0.5
  chart:
    kind: ["image", "table"]
  agent_path_includes: ["ask_sql_specialist", "ask_code_specialist", "ask_validator"]
